<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <title>LifePath — La tua strada, ogni giorno</title>
    <meta name="description" content="LifePath trasforma la tua storia, la tua identità e i tuoi sogni in un percorso concreto da vivere ogni giorno." />

    <!-- Rende l'app "installabile" sulla schermata Home del telefono -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2C3E50" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LifePath" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" href="/icon-192.png" />
  </head>
  <body style="margin:0;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Registra il service worker: senza questo l'app non si può "installare"
      // né usare quando il telefono perde la connessione.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
